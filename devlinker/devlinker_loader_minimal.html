<!-- Minimal DevLinker Loader for Local Users -->
<style>
  #devlinker-loader-min {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.92);
    min-height: 100vh;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
  }
  .devlinker-spinner-min {
    width: 48px;
    height: 48px;
    border: 4px solid #e0e7ef;
    border-top: 4px solid #2563eb;
    border-right: 4px solid #60a5fa;
    border-bottom: 4px solid #a5b4fc;
    border-left: 4px solid #e0e7ef;
    border-radius: 50%;
    animation: spin 0.8s cubic-bezier(.6,.2,.4,1) infinite;
    margin-bottom: 2.5rem;
    box-shadow: 0 2px 12px 0 rgba(37,99,235,0.10);
    background: transparent;
    position: relative;
  }
  .devlinker-spinner-min::after {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 50%;
    border: 2px solid #dbeafe;
    opacity: 0.7;
    box-sizing: border-box;
  }
  @keyframes spin {
    100% { transform: rotate(360deg); }
  }
  .devlinker-powered {
    position: fixed;
    bottom: 18px;
    left: 0;
    width: 100vw;
    text-align: center;
    color: #2563eb;
    font-size: 1.08rem;
    font-weight: 500;
    opacity: 0.85;
    letter-spacing: 0.01em;
    pointer-events: none;
    user-select: none;
  }
</style>
<div id="devlinker-loader-min">
  <div class="devlinker-spinner-min"></div>
</div>
<div class="devlinker-powered">Powered by DevLinker</div>
<script>
// Hide loader after 5s or when page loads
function hideLoaderMin() {
  const el = document.getElementById("devlinker-loader-min");
  if (el) el.style.display = "none";
  const powered = document.querySelector('.devlinker-powered');
  if (powered) powered.style.display = "none";
}
window.addEventListener("load", hideLoaderMin);
setTimeout(hideLoaderMin, 5000);
</script>
