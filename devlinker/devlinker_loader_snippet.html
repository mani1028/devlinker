<!-- DevLinker Next-Level Loader Overlay -->
<style>
  #devlinker-loader {
    position: fixed;
    z-index: 99999;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 100%);
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    transition: opacity 0.4s cubic-bezier(.4,0,.2,1);
  }
  .devlinker-loader-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    padding: 40px 30px;
    min-width: 260px;
    max-width: 94vw;
    text-align: center;
    border: 1.5px solid #e0e7ef;
    position: relative;
    width: 100%;
    max-width: 350px;
  }
  .devlinker-logo {
    font-size: 2.1rem;
    font-weight: 600;
    color: #2563eb;
    margin-bottom: 20px;
    letter-spacing: -1.2px;
    user-select: none;
  }
  .devlinker-spin {
    margin: 20px auto;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .devlinker-spinner {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 4px solid #e0e7ef;
    border-top: 4px solid #3b82f6;
    animation: devlinker-spin 1.1s linear infinite;
  }
  @keyframes devlinker-spin {
    100% { transform: rotate(360deg); }
  }
  .devlinker-brand {
    font-size: 1.13rem;
    color: #222;
    font-weight: 600;
    margin-bottom: 0.2rem;
    letter-spacing: -0.5px;
  }
  .devlinker-desc {
    font-size: 1.01rem;
    color: #555;
    margin-bottom: 0.7rem;
  }
  .devlinker-upgrade-btn {
    margin-top: 15px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(37,99,235,0.08);
    transition: background 0.2s, box-shadow 0.2s;
    outline: none;
    display: inline-block;
  }
  .devlinker-upgrade-btn:hover {
    background: #1d4ed8;
    box-shadow: 0 4px 16px rgba(37,99,235,0.13);
  }
  @media (max-width: 600px) {
    .devlinker-loader-card {
      min-width: 0;
      padding: 1.2rem 0.5rem 1.1rem 0.5rem;
      border-radius: 12px;
    }
    .devlinker-logo {
      font-size: 1.3rem;
    }
    .devlinker-upgrade-btn {
      font-size: 0.97rem;
      padding: 8px 12px;
    }
  }
</style>
<div id="devlinker-loader">
  <div class="devlinker-loader-card">
    <div class="devlinker-logo">∞ DevLinker</div>
    <div class="devlinker-spin"><div class="devlinker-spinner"></div></div>
    <div class="devlinker-brand">Loading your app...</div>
    <div class="devlinker-desc">Powered by <span style="color:#2563eb;font-weight:700;">DevLinker</span> 🚀</div>
    <a href="https://devlinker.app" target="_blank" rel="noopener">
      <button class="devlinker-upgrade-btn">Upgrade for custom domain</button>
    </a>
  </div>
</div>
<script>
const start = Date.now();
function hideLoader() {
  const minTime = 1000; // 1 sec branding (increased from 0.8s)
  const elapsed = Date.now() - start;
  const delay = Math.max(0, minTime - elapsed);
  setTimeout(() => {
    const el = document.getElementById("devlinker-loader");
    if (el) {
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 400);
    }
  }, delay);
}
window.addEventListener("load", hideLoader);
setTimeout(hideLoader, 7000); // max 7s (increased from 5s)
</script>
