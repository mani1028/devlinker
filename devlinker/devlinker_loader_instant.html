<!-- DevLinker Instant Loader for Local/LAN Users -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    #devlinker-loader-min {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.92);
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    }
    .devlinker-spinner-min {
      width: 38px;
      height: 38px;
      border: 4px solid #e0e7ef;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2.5rem;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .devlinker-powered {
      position: fixed;
      bottom: 18px;
      left: 0;
      width: 100vw;
      text-align: center;
      color: #2563eb;
      font-size: 1.08rem;
      font-weight: 500;
      opacity: 0.85;
      letter-spacing: 0.01em;
      pointer-events: none;
      user-select: none;
      z-index: 100000;
    }
    .devlinker-loading-msg {
      font-size: 1.18rem;
      color: #222;
      font-weight: 500;
      margin-top: -1.5rem;
      margin-bottom: 2.2rem;
      letter-spacing: 0.01em;
      text-align: center;
      opacity: 0.92;
    }
    .devlinker-3wev {
      font-size: 1.05rem;
      color: #2563eb;
      font-weight: 600;
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
      text-align: center;
      opacity: 0.93;
    }
  </style>
</head>
<body>
  <div id="devlinker-loader-min">
    <div class="devlinker-spinner-min"></div>
    <div class="devlinker-loading-msg">Loading your app…</div>
  </div>
  <div class="devlinker-powered">Powered by DevLinker</div>
  <script>
    // Fetch the real page and replace the loader, but show loader for at least 1s
    (async function() {
      const minTime = 1000;
      const start = Date.now();
      try {
        const resp = await fetch(window.location.href, { headers: { 'X-DevLinker-Instant': '1' } });
        const html = await resp.text();
        const elapsed = Date.now() - start;
        const delay = Math.max(0, minTime - elapsed);
        setTimeout(() => {
          document.open();
          document.write(html);
          document.close();
        }, delay);
      } catch (e) {
        // Show error if fetch fails
        var loader = document.getElementById('devlinker-loader-min');
        if (loader) {
          loader.innerHTML += '<div style="color:#b91c1c;font-size:1.1rem;margin-top:1.5rem;">Failed to load app. Please check your connection.</div>';
        }
      }
    })();
  </script>
</body>
</html>
