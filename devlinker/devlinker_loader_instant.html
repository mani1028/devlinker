<!-- DevLinker Instant Loader for Local/WLAN Users -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevLinker Loading</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b1220;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #e2e8f0;
    }
    #devlinker-loader-min {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .devlinker-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .devlinker-logo {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
      color: #f8fafc;
    }
    .devlinker-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(148, 163, 184, 0.25);
      border-top: 4px solid #22d3ee;
      border-radius: 50%;
      animation: devlinker-spin 1s linear infinite;
    }
    .devlinker-text {
      font-size: 1rem;
      color: #cbd5e1;
      font-weight: 600;
    }
    .devlinker-health {
      font-size: 0.84rem;
      color: #94a3b8;
      opacity: 0.9;
    }
    .devlinker-powered {
      position: fixed;
      bottom: 18px;
      left: 0;
      width: 100vw;
      text-align: center;
      color: #94a3b8;
      font-size: 0.92rem;
      font-weight: 500;
      opacity: 0.9;
      pointer-events: auto;
      user-select: text;
    }
    .devlinker-powered span {
      display: block;
      margin-top: 4px;
      color: #cbd5e1;
    }
    .devlinker-powered a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 600;
    }
    .devlinker-powered a:hover {
      color: #bae6fd;
      text-decoration: underline;
    }
    @keyframes devlinker-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="devlinker-loader-min">
    <div class="devlinker-center">
      <div class="devlinker-logo">DevLinker</div>
      <div class="devlinker-spinner"></div>
      <div class="devlinker-text">Loading your app...</div>
      <div class="devlinker-health">Frontend connected • Backend connected</div>
    </div>
  </div>
  <div class="devlinker-powered">
    Powered by DevLinker 🚀
    <span>Support the project ❤️ <a href="upi://pay?pa=devlinker@upi&pn=DevLinker&cu=INR&tn=Support%20DevLinker%20Project%20🚀">devlinker@upi</a></span>
  </div>
  <script>
    // Fetch the real page and replace the loader with a short minimum display for smoothness.
    (async function() {
      const minTime = 500;
      const start = Date.now();
      try {
        const resp = await fetch(window.location.href, {
          headers: { "X-DevLinker-Instant": "1" },
          cache: "no-store",
        });
        const html = await resp.text();
        const elapsed = Date.now() - start;
        const delay = Math.max(0, minTime - elapsed);
        setTimeout(() => {
          document.open();
          document.write(html);
          document.close();
        }, delay);
      } catch (e) {
        // Show error if fetch fails
        var loader = document.getElementById("devlinker-loader-min");
        if (loader) {
          loader.innerHTML += '<div style="color:#b91c1c;font-size:1.05rem;margin-top:1.5rem;">Failed to load app. Please check your connection.</div>';
        }
      }
    })();
  </script>
</body>
</html>
